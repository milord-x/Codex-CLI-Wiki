<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex CLI Wiki</title>
    <meta name="description" content="Codex CLI Wiki — структурированная документация по Codex CLI с поиском и навигацией." />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><text y='.9em' x='50%' text-anchor='middle' font-size='70' fill='white'>C</text></svg>" />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-panel">
          <div class="brand">
            <div class="brand-mark">C</div>
            <div>
              <div class="eyebrow" id="brandEyebrow">GitHub Pages</div>
              <h1 id="brandName">Codex CLI Wiki</h1>
            </div>
          </div>

          <div class="lang-switch" id="langSwitch"></div>

          <button class="mobile-toggle" id="mobileToggle" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12h18M3 6h18M3 18h18"/>
            </svg>
            <span id="mobileToggleText">Разделы</span>
          </button>

          <div class="search-box">
            <span id="searchLabel">Поиск</span>
            <input
              id="searchInput"
              type="search"
              placeholder="Поиск по документации..."
              autocomplete="off"
            />
          </div>

          <div class="filters" id="filters"></div>
          <div class="search-results hidden" id="searchResults"></div>

          <nav class="nav-tree" id="navTree"></nav>

          <div class="sidebar-footer">
            <a href="https://github.com/milord-x/Codex-CLI-Wiki" target="_blank" rel="noreferrer">
              View on GitHub →
            </a>
          </div>
        </div>
      </aside>

      <main class="content-area">
        <header class="page-toolbar">
          <div class="toolbar-copy">
            <div class="eyebrow" id="pageEyebrow">Документация</div>
            <div id="pageBreadcrumb" style="font-size: 14px; font-weight: 500;"></div>
          </div>
          <div class="toolbar-actions">
            <button class="ghost-button" id="homeButton" type="button">На главную</button>
            <button class="ghost-button" id="copyLinkButton" type="button">Копировать ссылку</button>
          </div>
        </header>

        <article class="doc-card" id="docCard">
          <div class="doc-header" id="docHeader"></div>
          <div class="doc-content" id="docContent"></div>
        </article>
      </main>

      <aside class="toc-panel">
        <div class="toc-card">
          <div class="eyebrow" id="tocEyebrow">Навигация</div>
          <div class="toc-list" id="tocList"></div>
          <div class="toc-meta" id="tocMeta"></div>
        </div>
      </aside>
    </div>

    <script src="./data/content.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
