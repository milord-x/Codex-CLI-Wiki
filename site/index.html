<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Codex CLI Wiki</title>
  <meta name="description" content="Codex CLI Wiki — structured documentation for Codex CLI workflows." />
  <meta name="theme-color" content="#0d9488" />
  <link rel="icon" type="image/png" href="./assets/logo.png" />
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="brand">
          <img src="./assets/logo.png" alt="Codex" />
          <div class="brand-text">
            <span id="brandEyebrow">Documentation Hub</span>
            <h1 id="brandName">Codex CLI Wiki</h1>
          </div>
        </div>

        <div class="lang-wrap" id="langWrap">
          <button class="lang-btn" id="langBtn" type="button">
            <span id="langCurrentLabel">English</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div class="lang-menu" id="langMenu"></div>
        </div>

        <button class="mobile-toggle" id="mobileToggle" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          <span id="mobileToggleText">Sections</span>
        </button>

        <div class="search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" type="search" placeholder="Search documentation..." autocomplete="off" />
        </div>
        <div class="search-results" id="searchResults"></div>

        <div class="filters" id="filters"></div>

        <nav class="nav" id="navTree"></nav>

        <div class="footer">
          <a href="https://github.com/milord-x/Codex-CLI-Wiki" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            GitHub
          </a>
          <button id="themeToggle" type="button">
            <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <span id="themeLabel">Dark mode</span>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div class="toolbar">
        <div class="toolbar-left">
          <span id="pageEyebrow">Documentation</span>
          <span id="pageBreadcrumb"></span>
        </div>
        <div class="toolbar-right">
          <button id="homeButton" type="button">Home</button>
          <button id="copyLinkButton" type="button">Copy link</button>
        </div>
      </div>

      <article class="article" id="docCard">
        <header class="article-header" id="docHeader"></header>
        <div class="content" id="docContent"></div>
      </article>
    </main>

    <!-- TOC -->
    <aside class="toc" id="toc">
      <div class="toc-inner">
        <span id="tocEyebrow">On this page</span>
        <div class="toc-links" id="tocList"></div>
        <div class="toc-meta" id="tocMeta"></div>
      </div>
    </aside>
  </div>

  <script src="./data/content.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>
